<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#005293" />
  <title>IsarChecKI — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F6EF;
      color: #1a1a1a;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 3.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #005293; }
    p { font-size: 1rem; color: #555; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: #005293;
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">🌊</div>
  <h1>Kein Internetzugang</h1>
  <p>Die Isar-Daten konnten nicht geladen werden. Bitte prüfe deine Verbindung und versuche es erneut.</p>
  <button onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
